version: "3.8"

services:
  db:
    container_name: mysql-task-db
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/x86_64
    ports:
      - "3306:3306"
    env_file:
      - ./.env
    volumes:
      # DB の中身をホスト側に永続化するボリューム
      - db-data:/var/lib/mysql
      # 起動時に実行してほしい SQL ファイルをマウント
      - ./init:/docker-entrypoint-initdb.d

volumes:
  db-data:
    name: mysql-task-db-data
